name: Build, Scan & Publish Image

on:
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "assets/**"
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_PATH: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Get Current Date
        id: date
        if: ${{ github.ref == 'refs/heads/main' }}
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Image
        run: docker build . --file Dockerfile --tag ${{ env.IMAGE_PATH }}:${{ env.DATE }} --tag ${{ env.IMAGE_PATH }}:latest

      - name: Scan Image
        uses: anchore/scan-action@v7
        id: scan
        with:
          image: "${{ env.IMAGE_PATH }}:latest"
          fail-build: true
          severity-cutoff: "critical"
          output-format: "sarif"

      - name: Install Grype
        if: always()
        uses: anchore/scan-action/download-grype@v7

      - name: Generate Scan Report
        if: always()
        run: |
          grype ${{ env.IMAGE_PATH }}:latest -o table > grype-report.txt || true
          echo "## Security Scan Summary" > scan-summary.md
          echo "" >> scan-summary.md
          echo "**Image:** \`${{ env.IMAGE_PATH }}:latest\`" >> scan-summary.md
          echo "**Scanned:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> scan-summary.md
          echo "**Scanner:** Anchore Grype" >> scan-summary.md
          echo "**Severity threshold:** Critical (blocks push)" >> scan-summary.md
          echo "" >> scan-summary.md
          echo "### Findings" >> scan-summary.md
          echo '```' >> scan-summary.md
          cat grype-report.txt >> scan-summary.md
          echo '```' >> scan-summary.md

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Scan Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-scan-${{ env.DATE || 'scheduled' }}
          path: |
            ${{ steps.scan.outputs.sarif }}
            grype-report.txt
            scan-summary.md
          retention-days: 90

      - name: Log in to GHCR
        if: ${{ steps.scan.outcome == 'success' }}
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
          registry: ghcr.io

      - name: Push Image to GHCR
        if: ${{ steps.scan.outcome == 'success' }}
        run: docker push ${{ env.IMAGE_PATH }}:${{ env.DATE }} && docker push ${{ env.IMAGE_PATH }}:latest